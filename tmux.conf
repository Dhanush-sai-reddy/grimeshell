# ============================================================================
# SHELLLL — Agent-Optimized tmux Configuration
# Designed for terminal-first AI agent workflows on CachyOS.
# ============================================================================

# --- Prefix -----------------------------------------------------------------
# Ctrl-a is more ergonomic than the default Ctrl-b
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- General Settings -------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"   # True color support
set -g mouse on                                     # Mouse mode
set -g base-index 1                                 # Windows start at 1
setw -g pane-base-index 1                           # Panes start at 1
set -g renumber-windows on                          # Renumber on close
set -g escape-time 0                                # No delay for escape
set -g repeat-time 400                              # Repeat timeout (ms)
set -g history-limit 50000                          # Massive scrollback
set -g display-time 2000                            # Message display (ms)
set -g display-panes-time 2000                      # Pane number display (ms)
set -g focus-events on                              # Focus events for vim
set -g set-clipboard on                             # System clipboard
setw -g aggressive-resize on                        # Better multi-monitor

# --- Vi Mode ----------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -selection clipboard"
bind -T copy-mode-vi Escape send -X cancel

# --- Pane Splitting ---------------------------------------------------------
# | for vertical split, - for horizontal split (intuitive)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New window in current path
bind c new-window -c "#{pane_current_path}"

# --- Pane Navigation --------------------------------------------------------
# Vim-style pane switching
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Alt + arrow for pane switching (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Pane Resizing ----------------------------------------------------------
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Window Navigation ------------------------------------------------------
bind -n S-Left  previous-window
bind -n S-Right next-window

# --- Reload Config ----------------------------------------------------------
bind r source-file ~/.tmux.conf \; display-message "  tmux.conf reloaded!"

# --- Status Bar (Dark Modern Theme) ----------------------------------------
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-justify left

# Colors — dark theme matching CachyOS aesthetic
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# Left: session name with agent indicator
set -g status-left-length 40
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold]  #S #[fg=#7aa2f7,bg=#1a1b26,nobold] "

# Right: agent indicator + date/time
set -g status-right-length 80
set -g status-right "#[fg=#565f89] %Y-%m-%d #[fg=#7aa2f7]│#[fg=#a9b1d6] %H:%M #[fg=#1a1b26,bg=#f7768e,bold] 🤖 AGENT #[default]"

# Window status
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W #[default]"
setw -g window-status-separator ""

# --- Pane Borders -----------------------------------------------------------
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# --- Message Style ----------------------------------------------------------
set -g message-style "fg=#7aa2f7,bg=#1a1b26,bold"
set -g message-command-style "fg=#f7768e,bg=#1a1b26"

# --- Clock ------------------------------------------------------------------
setw -g clock-mode-colour "#7aa2f7"
setw -g clock-mode-style 24

# --- Activity ---------------------------------------------------------------
setw -g monitor-activity on
set -g visual-activity off
setw -g window-status-activity-style "fg=#e0af68,bg=#1a1b26"
